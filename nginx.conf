server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2|svg|png|jpg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}